<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypoFlow CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        body { font-family: 'Roboto', sans-serif; }
        @layer components {
            .surface { @apply bg-[#fdfcff] border border-[#e1e2ec] rounded-[28px] shadow-sm; }
            .m3-btn-primary { @apply bg-[#005ac1] hover:bg-[#004696] text-white px-6 py-3 rounded-full transition-all shadow-md hover:shadow-lg flex items-center gap-2 font-medium; }
            .m3-btn-tonal { @apply bg-[#d3e4ff] hover:bg-[#bacde5] text-[#001c3b] px-4 py-2 rounded-full transition-all font-medium; }
            .m3-input { @apply bg-[#f0f0f3] border-b-2 border-slate-400 focus:border-[#005ac1] px-4 py-3 rounded-t-lg outline-none transition-all w-full; }
        }
    </style>
</head>
<body class="bg-[#f8f9ff] text-[#1a1b1f]">
    <nav class="px-6 py-4 flex justify-between items-center bg-[#fdfcff]/80 backdrop-blur-md sticky top-0 z-50 border-b border-[#e1e2ec]">
        <div class="flex items-center gap-3">
            <a href="{% url 'order_list' %}" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#005ac1] rounded-2xl flex items-center justify-center text-white shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                </div>
                <span class="text-xl font-medium tracking-tight">GresZharnama CRM</span>
            </a>
        </div>

        <div class="flex items-center gap-4">
            {% if user.is_authenticated %}
                <div class="hidden md:flex items-center gap-4 mr-4">
                    <span class="text-sm text-[#44474e]">Привет, <b>{{ user.username }}</b></span>
                    <a href="{% url 'order_list' %}" class="text-sm font-medium hover:text-[#005ac1]">Заказы</a>
                    <a href="/admin" class="text-sm font-medium hover:text-[#005ac1]">Админ</a>
                </div>
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="m3-btn-tonal bg-red-50 text-red-700 hover:bg-red-100 py-1.5 px-4 text-xs">Выйти</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="m3-btn-primary py-2 px-6 text-sm">Войти</a>
            {% endif %}
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
