<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GresZharnama CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        body { font-family: 'Roboto', sans-serif; }
        @layer components {
            .surface { @apply bg-[#fdfcff] border border-[#e1e2ec] rounded-[28px] shadow-sm; }
            .m3-btn-primary { @apply bg-[#005ac1] hover:bg-[#004696] text-white px-6 py-3 rounded-full transition-all shadow-md flex items-center gap-2 font-medium; }
            .m3-btn-tonal { @apply bg-[#d3e4ff] hover:bg-[#bacde5] text-[#001c3b] px-4 py-2 rounded-full transition-all font-medium; }
            .m3-input { @apply bg-[#f0f0f3] border-b-2 border-slate-400 focus:border-[#005ac1] px-4 py-3 rounded-t-lg outline-none transition-all w-full; }
            .nav-link { @apply flex items-center gap-4 px-6 py-4 rounded-2xl text-[#44474e] hover:bg-[#e1e2ec] hover:text-[#1a1b1f] transition-all font-medium; }
            .nav-link.active { @apply bg-[#d3e4ff] text-[#001c3b]; }
        }
    </style>
</head>
<body class="bg-[#f8f9ff] text-[#1a1b1f] flex min-h-screen">

    <aside class="w-72 bg-[#fdfcff] border-r border-[#e1e2ec] flex flex-col fixed h-full z-50">
        <div class="p-8">
            <a href="{% url 'order_list' %}" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#005ac1] rounded-2xl flex items-center justify-center text-white shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                </div>
                <span class="text-xl font-bold tracking-tight">Gres CRM</span>
            </a>
        </div>

        <nav class="flex-grow px-4 space-y-2">
            <a href="{% url 'order_list' %}" class="nav-link {% if request.resolver_match.url_name == 'order_list' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
                Рабочий поток
            </a>

            {% if user.is_superuser or perms.orders.add_order %}
            <a href="{% url 'order_create' %}" class="nav-link {% if request.resolver_match.url_name == 'order_create' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                Новый заказ
            </a>
            {% endif %}

            <a href="{% url 'warehouse' %}" class="nav-link {% if request.resolver_match.url_name == 'warehouse' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
                Склад
            </a>

            <a href="/admin" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                Админ-панель
            </a>
        </nav>

        <div class="p-4 border-t border-[#e1e2ec]">
            {% if user.is_authenticated %}
                <div class="flex items-center gap-3 mb-4 px-4">
                    <div class="w-10 h-10 bg-[#d3e4ff] rounded-full flex items-center justify-center text-[#001c3b] font-bold">
                        {{ user.username|slice:":1"|upper }}
                    </div>
                    <div class="flex flex-col">
                        <span class="text-sm font-bold text-[#1a1b1f]">{{ user.username }}</span>
                        <span class="text-[10px] text-[#44474e] uppercase font-bold tracking-tighter">Сотрудник</span>
                    </div>
                </div>
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="w-full text-left px-6 py-3 rounded-2xl text-red-600 hover:bg-red-50 transition-all font-medium flex items-center gap-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                        Выйти
                    </button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="m3-btn-primary w-full justify-center">Войти</a>
            {% endif %}
        </div>
    </aside>

    <main class="flex-grow ml-72 p-8 min-h-screen">
        <div class="max-w-6xl mx-auto">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
