{% extends 'base.html' %}

{% block content %}
<div class="max-w-[400px] mx-auto mt-24">
    <div class="glass-card p-10 shadow-2xl shadow-slate-200/60 border-slate-200/50">
        <div class="flex flex-col items-center mb-10">
            <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-200 mb-6 transition-transform hover:scale-105">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">Gres CRM</h1>
            <p class="text-slate-400 text-sm font-medium mt-1">Авторизация в системе</p>
        </div>

        <form method="post" class="space-y-5">
            {% csrf_token %}
            
            <div class="space-y-1.5">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Логин</label>
                <input type="text" name="username" class="form-input" placeholder="Введите логин" required>
            </div>

            <div class="space-y-1.5">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Пароль</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            
            {% if form.errors %}
                <div class="p-3 bg-red-50 rounded-xl border border-red-100 flex items-center gap-3">
                    <div class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></div>
                    <p class="text-red-600 text-[11px] font-bold uppercase tracking-tight">Неверный логин или пароль</p>
                </div>
            {% endif %}

            <div class="pt-4">
                <button type="submit" class="btn-primary w-full py-4 text-base shadow-xl shadow-indigo-100 uppercase tracking-widest font-black">
                    Войти в CRM
                </button>
            </div>
        </form>

        <p class="text-center text-[10px] text-slate-300 font-bold uppercase tracking-[0.2em] mt-10">
            © 2026 Gres Zharnama
        </p>
    </div>
</div>

<style>
    /* Прячем боковое меню на странице входа, если оно вдруг отображается */
    aside { display: none !important; }
    main { margin-left: 0 !important; padding-top: 0 !important; }
    body { 
        background: radial-gradient(circle at top right, #f1f5f9 0%, #f8fafc 100%);
    }
</style>
{% endblock %}
