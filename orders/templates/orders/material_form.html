{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <header class="mb-10 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-[#d3e4ff] text-[#001c3b] rounded-2xl mb-4 shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
            </svg>
        </div>
        <h1 class="text-4xl font-light text-[#1a1b1f]">Добавить материал</h1>
        <p class="text-[#44474e] mt-2 italic text-sm">Внесите данные о новом рулоне или товаре на склад</p>
    </header>

    <form method="post" class="surface p-8 bg-white space-y-6">
        {% csrf_token %}
        
        <div class="space-y-2">
            <label class="text-[10px] font-bold text-[#74777f] uppercase tracking-widest ml-4">Название материала</label>
            {{ form.name }}
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-[#74777f] uppercase tracking-widest ml-4">Тип</label>
                {{ form.material_type }}
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-[#74777f] uppercase tracking-widest ml-4">Ширина рулона (м)</label>
                {{ form.width }}
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-[#74777f] uppercase tracking-widest ml-4">Текущий остаток</label>
                {{ form.total_stock }}
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-[#74777f] uppercase tracking-widest ml-4">Критический порог</label>
                {{ form.min_stock }}
            </div>
        </div>

        <div class="flex items-center justify-between pt-6 border-t border-[#e1e2ec]">
            <a href="{% url 'warehouse' %}" class="text-sm font-bold text-[#44474e] hover:text-red-500 uppercase tracking-tighter">Отмена</a>
            <button type="submit" class="m3-btn-primary px-10 py-3 shadow-lg uppercase tracking-tighter">Сохранить</button>
        </div>
    </form>
</div>
{% endblock %}
