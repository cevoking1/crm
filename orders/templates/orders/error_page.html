{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto mt-20 text-center">
    <div class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
    </div>
    <h1 class="text-4xl font-light text-[#1a1b1f] mb-4">Материалы закончились!</h1>
    <p class="text-[#44474e] italic mb-10 leading-relaxed">
        Мы не смогли запустить <b>Заказ №{{ order.id }}</b> в производство, так как на складе не хватает следующих позиций:
    </p>

    <div class="surface p-8 bg-white border-red-100 text-left space-y-4 mb-10">
        {% for error in errors %}
            <div class="flex items-center gap-3 text-red-600 font-bold">
                <div class="w-1.5 h-6 bg-red-500 rounded-full"></div>
                {{ error }}
            </div>
        {% endfor %}
    </div>

    <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a href="{% url 'warehouse' %}" class="m3-btn-primary bg-slate-800">Пополнить склад</a>
        <a href="{% url 'order_detail' order.id %}" class="m3-btn-tonal border border-slate-200">Вернуться к заказу</a>
    </div>
</div>
{% endblock %}
